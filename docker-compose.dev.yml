version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8888:8888"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres-dev:5432/m3tacron_dev}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://dev.m3tacron.com,https://www.dev.m3tacron.com,http://localhost:3333}
    depends_on:
      - postgres-dev
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
      args:
        - VITE_API_BASE=${VITE_API_BASE:-/api}
    ports:
      - "3333:3333"
    environment:
      - ORIGIN=${ORIGIN:-https://dev.m3tacron.com}
      - VITE_API_BASE=${VITE_API_BASE:-https://api.dev.m3tacron.com}
      - VITE_PROXY_TARGET=${VITE_PROXY_TARGET:-http://backend:8888}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3333/', (r) => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-dev:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: m3tacron_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

volumes:
  pgdata_dev:
