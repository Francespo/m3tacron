name: Scrape Tournaments

permissions:
  contents: write

on:
  schedule:
    # Run at 08:00 UTC every day
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to scrape'
        required: true
        default: 'longshanks+rollbetter'
        type: choice
        options:
          - longshanks+rollbetter
          - longshanks
          - rollbetter
          - listfortress
          - all
      time_range:
        description: 'Time range: integer days (e.g. 7), keyword (yesterday/today/week/month), ISO date range (YYYY-MM-DD:YYYY-MM-DD), or single ISO date (YYYY-MM-DD)'
        required: true
        default: 'yesterday'
        type: string
      environment:
        description: 'Target database environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - dev

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Install Playwright browsers
      run: |
        playwright install chromium --with-deps
        
    - name: Run Scraper
      env:
        DATABASE_URL: ${{ inputs.environment == 'prod' && secrets.PROD_DATABASE_URL || secrets.DEV_DATABASE_URL }}
        PYTHONPATH: .
      run: |
        # Use inputs if available, otherwise default to longshanks+rollbetter/yesterday
        PLATFORM="${{ inputs.platform }}"
        TIME_RANGE="${{ inputs.time_range }}"
        
        if [ -z "$PLATFORM" ]; then PLATFORM="longshanks+rollbetter"; fi
        if [ -z "$TIME_RANGE" ]; then TIME_RANGE="yesterday"; fi
        
        python -m backend.scripts.scrape_tournaments --platform "$PLATFORM" --time-range "$TIME_RANGE"
    
    - name: Upload Database Artifact
      if: success() && hashFiles('main.db') != ''
      uses: actions/upload-artifact@v4
      with:
        name: main-db
        path: main.db
        retention-days: 5

    - name: Commit and Push Changes
      if: hashFiles('main.db') != ''
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add main.db
        git commit -m "Update main.db with latest tournament data" || exit 0
        git push
