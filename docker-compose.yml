services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - data:/app/backend/data
      - ./test.db:/app/test.db
    environment:
      - DATABASE_URL=sqlite:///test.db
    restart: always

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - ORIGIN=http://localhost:3000
    depends_on:
      - backend
    restart: always

volumes:
  data:
